AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Chat Colaborativo Serverless Completo com Domínio Customizado

Parameters:
  DomainName:
    Type: String
    Default: app.livechat.udstec.io
    Description: Domínio customizado para a aplicação
  
  HostedZoneId:
    Type: String
    Description: ID da Hosted Zone do Route53 para ai.udstec.io
    Default: ""
  
  CertificateArn:
    Type: String
    Description: ARN do certificado ACM para *.ai.udstec.io (us-east-1)
    Default: ""
  
  Stage:
    Type: String
    Default: prod
    Description: Stage do API Gateway

Conditions:
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        CHATROOMS_TABLE: !Ref ChatRoomsTable
        MESSAGES_TABLE: !Ref MessagesTable
        TRANSCRIPTIONS_TABLE: !Ref TranscriptionsTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        AUDIO_BUCKET: !Ref AudioBucket
        WEBSOCKET_ENDPOINT: !Sub 'https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
        API_GATEWAY_DOMAIN_NAME: !Sub '${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com'
        STAGE: !Ref Stage

Resources:
  # ==================== DynamoDB Tables ====================
  
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-Users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  ChatRoomsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-ChatRooms'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: roomId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: createdAt
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  MessagesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-Messages'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RoomMessagesIndex
          KeySchema:
            - AttributeName: roomId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  TranscriptionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-Transcriptions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: transcriptionId
          AttributeType: S
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: transcriptionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RoomTranscriptionsIndex
          KeySchema:
            - AttributeName: roomId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  RoomEventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-RoomEvents'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RoomEventsIndex
          KeySchema:
            - AttributeName: roomId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-Connections'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: connectedAt
          AttributeType: N
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserConnectionsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: connectedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: RoomConnectionsIndex
          KeySchema:
            - AttributeName: roomId
              KeyType: HASH
            - AttributeName: connectedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  # Tabela para metadados de gravações
  RecordingsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-Recordings'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: recordingId
          AttributeType: S
        - AttributeName: userLogin
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: recordingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserRecordingsIndex
          KeySchema:
            - AttributeName: userLogin
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  # Tabela para histórico de reuniões
  MeetingHistoryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-meeting-history'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: meetingId
          AttributeType: S
        - AttributeName: userLogin
          AttributeType: S
        - AttributeName: startTime
          AttributeType: N
      KeySchema:
        - AttributeName: meetingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserMeetingsIndex
          KeySchema:
            - AttributeName: userLogin
              KeyType: HASH
            - AttributeName: startTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  # ==================== S3 Buckets ====================
  
  # S3 Buckets with DeletionPolicy
  
  # Bucket para gravações de reuniões
  RecordingsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${AWS::StackName}-recordings-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldRecordings
            Status: Enabled
            ExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: 
              - 'https://app.livechat.udstec.io'
              - 'https://livechat.ai.udstec.io'
              - 'http://localhost:5173'
            AllowedMethods: [GET, PUT, POST, HEAD]
            AllowedHeaders: ['*']
            ExposedHeaders: ['ETag']
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: ChatColaborativo
  
  AudioBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${AWS::StackName}-audio-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldAudio
            Status: Enabled
            ExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedHeaders: ['*']
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: ChatColaborativo

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Application
          Value: ChatColaborativo

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ==================== CloudFront ====================
  
  # M-005: Security Headers Policy
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${AWS::StackName}-security-headers'
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Override: true
            Protection: true

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function para remover /api prefix
  ApiPathRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${AWS::StackName}-api-rewrite'
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          request.uri = request.uri.replace(/^\/api/, '');
          if (request.uri === '') request.uri = '/';
          return request;
        }
      FunctionConfig:
        Comment: Remove /api prefix for API Gateway proxy
        Runtime: cloudfront-js-2.0

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Chat Colaborativo - ${AWS::StackName}'
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
          - Id: ApiOrigin
            DomainName: !Sub '${RecordingApi}.execute-api.${AWS::Region}.amazonaws.com'
            OriginPath: '/prod'
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        CacheBehaviors:
          - PathPattern: '/api/*'
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: '4135ea2d-6df8-44a3-9df3-4b5a84be39ad'
            OriginRequestPolicyId: 'b689b0a8-53d0-40ab-baf2-68738e2966ac'
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ApiPathRewriteFunction.FunctionARN
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100
      Tags:
        - Key: Application
          Value: ChatColaborativo

  # ==================== Route53 ====================
  
  FrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCertificate
    Properties:
      DomainName: !Sub 'api.livechat.udstec.io'
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  ApiHttpDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCertificate
    DependsOn: RecordingApiStage
    Properties:
      ApiId: !Ref RecordingApi
      DomainName: !Ref ApiDomainName
      Stage: !Ref Stage

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    DependsOn: ApiDomainName
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: api.livechat.udstec.io
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId


  # ==================== Cognito ====================
  
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Application: ChatColaborativo

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${AWS::StackName}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: minutes
        IdToken: minutes

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${AWS::StackName}-${AWS::AccountId}'
      UserPoolId: !Ref UserPool

  # ==================== HTTP API para Gravações ====================
  
  RecordingApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-recording-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - 'https://app.livechat.udstec.io'
          - 'https://livechat.ai.udstec.io'
          - 'http://localhost:5173'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Api-Key
          - X-Idempotency-Key
        MaxAge: 0
      Tags:
        Application: ChatColaborativo

  RecordingApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref RecordingApi
      StageName: !Ref Stage
      AutoDeploy: true

  # ==================== WebSocket API ====================
  
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-websocket'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
      Tags:
        Application: ChatColaborativo

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Stage
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 5000
        ThrottlingRateLimit: 2000
      Tags:
        Application: ChatColaborativo

  # ==================== Lambda Functions ====================
  
  ConnectionHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-connection-handler'
      CodeUri: ../backend/lambdas/connection-handler/
      Handler: index.handler
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          USERS_TABLE: !Ref UsersTable
          ROOM_EVENTS_TABLE: !Ref RoomEventsTable
          API_GATEWAY_DOMAIN_NAME: !Sub '${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com'
          STAGE: !Ref Stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomEventsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        Application: ChatColaborativo

  MessageHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-message-handler'
      CodeUri: ../backend/lambdas/message-handler/
      Handler: index.handler
      Environment:
        Variables:
          MESSAGES_TABLE: !Ref MessagesTable
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          TRANSCRIPTIONS_TABLE: !Ref TranscriptionsTable
          ROOM_EVENTS_TABLE: !Ref RoomEventsTable
          API_GATEWAY_DOMAIN_NAME: !Sub '${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com'
          STAGE: !Ref Stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomEventsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        Application: ChatColaborativo

  AudioStreamProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-audio-stream-processor'
      CodeUri: ../backend/lambdas/audio-stream-processor/
      Handler: index.handler
      Timeout: 300
      MemorySize: 1024
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptionsTable
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - transcribe:StartStreamTranscription
                - transcribe:StartStreamTranscriptionWebSocket
              Resource: '*'
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        Application: ChatColaborativo

  TranscriptionAggregatorFunction:
    Type: AWS::Serverless::Function
    DependsOn: AIAnalysisFunction
    Properties:
      FunctionName: !Sub '${AWS::StackName}-transcription-aggregator'
      CodeUri: ../backend/lambdas/transcription-aggregator/
      Handler: index.handler
      Environment:
        Variables:
          AI_ANALYSIS_FUNCTION: !GetAtt AIAnalysisFunction.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt AIAnalysisFunction.Arn
      Tags:
        Application: ChatColaborativo

  AIAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ai-analysis'
      CodeUri: ../backend/lambdas/ai-analysis/
      Handler: index.handler
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          BEDROCK_MODEL_ID: 'anthropic.claude-3-sonnet-20240229-v1:0'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TranscriptionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Tags:
        Application: ChatColaborativo

  InterviewAIFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-InterviewAIFunction'
      CodeUri: ../backend/lambdas/interview-ai/
      Handler: index.handler
      Timeout: 90
      MemorySize: 2048
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Tags:
        Application: ChatColaborativo

  ChimeMeetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-chime-meeting'
      CodeUri: ../backend/lambdas/chime-meeting/
      Handler: index.handler
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          MEETINGS_TABLE: !Ref ChatRoomsTable
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          MEETING_HISTORY_TABLE: !Ref MeetingHistoryTable
          INTERVIEW_AI_LAMBDA: !GetAtt InterviewAIFunction.Arn
          APP_BASE_URL: !Sub 'https://${DomainName}'
          API_GATEWAY_DOMAIN_NAME: !Sub '${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com'
          STAGE: !Ref Stage
          SUPER_ADMIN_LOGINS: 'rafael@uds.com.br'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatRoomsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MeetingHistoryTable
        - S3CrudPolicy:
            BucketName: !Ref AudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - chime:CreateMeeting
                - chime:CreateAttendee
                - chime:DeleteMeeting
                - chime:DeleteAttendee
                - chime:GetMeeting
                - chime:ListAttendees
                - chime:StartMeetingTranscription
                - chime:StopMeetingTranscription
              Resource: '*'
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt InterviewAIFunction.Arn
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Tags:
        Application: ChatColaborativo

  RoomManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-room-manager'
      CodeUri: ../backend/lambdas/room-manager/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatRoomsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
      Tags:
        Application: ChatColaborativo

  # Lambda para credenciais TURN dinâmicas
  TurnCredentialsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-turn-credentials'
      CodeUri: ../backend/lambdas/turn-credentials/
      Handler: index.handler
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TURN_SECRET: ''
          TURN_SERVER: ''
      Tags:
        Application: ChatColaborativo

  # Rota HTTP para TURN credentials
  TurnCredentialsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'POST /turn/credentials'
      Target: !Sub 'integrations/${TurnCredentialsIntegration}'

  TurnCredentialsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RecordingApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TurnCredentialsFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  TurnCredentialsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TurnCredentialsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RecordingApi}/*'

  # Rotas HTTP para Chime Meeting (todas as rotas de meeting, interview, admin, etc)
  ChimeMeetingRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'POST /{proxy+}'
      Target: !Sub 'integrations/${ChimeMeetingIntegration}'

  ChimeMeetingGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'GET /{proxy+}'
      Target: !Sub 'integrations/${ChimeMeetingIntegration}'

  ChimeMeetingDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'DELETE /{proxy+}'
      Target: !Sub 'integrations/${ChimeMeetingIntegration}'

  ChimeMeetingIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RecordingApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChimeMeetingFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  ChimeMeetingPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChimeMeetingFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RecordingApi}/*'

  # Lambda para gerenciar gravações
  RecordingManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-recording-manager'
      CodeUri: ../backend/lambdas/recording-manager/
      Handler: index.handler
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          RECORDINGS_BUCKET: !Ref RecordingsBucket
          RECORDINGS_TABLE: !Ref RecordingsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordingsTable
        - S3CrudPolicy:
            BucketName: !Ref RecordingsBucket
      Tags:
        Application: ChatColaborativo

  # Rotas HTTP para gravações
  RecordingUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'POST /recording/upload-url'
      Target: !Sub 'integrations/${RecordingIntegration}'

  RecordingPlaybackRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'POST /recording/playback-url'
      Target: !Sub 'integrations/${RecordingIntegration}'

  RecordingListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref RecordingApi
      RouteKey: 'POST /recording/list'
      Target: !Sub 'integrations/${RecordingIntegration}'

  RecordingIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref RecordingApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RecordingManagerFunction.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  RecordingPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RecordingManagerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RecordingApi}/*'

  # ==================== WebSocket Routes ====================
  
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub 'integrations/${ConnectIntegration}'

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectionHandlerFunction.Arn}/invocations'

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${DisconnectIntegration}'

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectionHandlerFunction.Arn}/invocations'

  # Rota default para capturar todas as mensagens não roteadas
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub 'integrations/${DefaultIntegration}'

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MessageHandlerFunction.Arn}/invocations'

  MessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: sendMessage
      Target: !Sub 'integrations/${MessageIntegration}'

  MessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MessageHandlerFunction.Arn}/invocations'

  AudioRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: sendAudio
      Target: !Sub 'integrations/${AudioIntegration}'

  AudioIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AudioStreamProcessorFunction.Arn}/invocations'

  RoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: manageRoom
      Target: !Sub 'integrations/${RoomIntegration}'

  RoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RoomManagerFunction.Arn}/invocations'

  WebRTCRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: webrtc-signal
      Target: !Sub 'integrations/${WebRTCIntegration}'

  WebRTCIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MessageHandlerFunction.Arn}/invocations'

  # ==================== Lambda Permissions ====================
  
  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConnectionHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  MessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MessageHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  AudioPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AudioStreamProcessorFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

  RoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RoomManagerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'

Outputs:
  WebSocketURL:
    Description: WebSocket API URL
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-WebSocketURL'

  FrontendURL:
    Description: Frontend URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-FrontendURL'

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDistributionId'

  FrontendBucketName:
    Description: S3 Bucket para Frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  AudioBucketName:
    Description: S3 Bucket para Audio Storage
    Value: !Ref AudioBucket
    Export:
      Name: !Sub '${AWS::StackName}-AudioBucket'

  CognitoHostedUIURL:
    Description: Cognito Hosted UI URL
    Value: !Sub 'https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${AWS::StackName}-CognitoHostedUIURL'

  RecordingApiURL:
    Description: Recording API URL
    Value: !Sub 'https://${RecordingApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
    Export:
      Name: !Sub '${AWS::StackName}-RecordingApiURL'

  RecordingsBucketName:
    Description: S3 Bucket para Gravações
    Value: !Ref RecordingsBucket
    Export:
      Name: !Sub '${AWS::StackName}-RecordingsBucket'
